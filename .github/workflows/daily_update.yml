name: Daily Cinema & Recs Update

"on":
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Run Cinema Scraper
        env:
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
        run: python scrape_cinema.py

      - name: Run Recommendations Scraper
        env:
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
        run: python scrape_recs.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add listings.json recommendations.json
          git diff-index --quiet HEAD || (git commit -m "Robot: Updated cinema listings and recs" && git push)
