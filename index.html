<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE QUEUE</title>
    <style>
        :root { --bg: #E6E6E6; --text: #1A1A1A; --grey: #CCCCCC; --accent: #195DDC; --white: #FFFFFF; }
        body { background: var(--bg); color: var(--text); font-family: "Helvetica Neue", Helvetica, sans-serif; margin: 0; padding: 30px; -webkit-font-smoothing: antialiased; }
        header { border-bottom: 3px solid var(--text); padding-bottom: 12px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .logo { font-weight: 900; font-size: 26px; letter-spacing: -1.5px; }
        nav { display: flex; gap: 30px; margin-bottom: 40px; }
        nav button { background: none; border: none; color: #999; padding: 10px 0; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 700; text-transform: uppercase; }
        nav button.active { color: var(--text); border-bottom: 3px solid var(--accent); }
        .tab-content { display: none; max-width: 800px; }
        .tab-content.active { display: block; }
        .row { border-bottom: 1px solid var(--grey); padding: 22px 0; display: flex; justify-content: space-between; align-items: center; }
        .row a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 18px; display: block; margin-bottom: 4px; }
        .meta { font-size: 10px; color: #666; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; display: block; }
        .stream-tag { font-size: 10px; color: var(--accent); font-weight: 700; display: block; margin-top: 6px; }
        .add-btn { background: var(--text); color: var(--white); border: none; width: 34px; height: 34px; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .search-container { display: flex; gap: 10px; margin-bottom: 30px; background: var(--white); padding: 5px; border: 1px solid var(--grey); }
        input { background: transparent; border: none; padding: 12px; font-family: inherit; flex-grow: 1; outline: none; font-size: 14px; }
        .search-btn { background: var(--text); color: var(--white); border: none; padding: 0 25px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .description { font-size: 13px; color: #444; margin-top: 6px; text-transform: none; line-height: 1.5; }
    </style>
</head>
<body>

<header>
    <div><div class="logo">THE QUEUE</div><div style="font-size: 11px; font-weight: 700; text-transform: uppercase;">B & K — Edinburgh — 2026</div></div>
    <div id="status-dot" style="color: var(--accent); font-size: 20px;">●</div>
</header>

<nav>
    <button onclick="tab('cinema')" id="b-cinema" class="active">Cinema</button>
    <button onclick="tab('recs')" id="b-recs">Recs</button>
    <button onclick="tab('queue')" id="b-queue">Library</button>
</nav>

<div id="cinema" class="tab-content active"></div>
<div id="recs" class="tab-content"></div>

<div id="queue" class="tab-content">
    <div class="search-container">
        <input type="text" id="m-input" placeholder="SEARCH TITLE...">
        <button class="search-btn" onclick="verifyAndAdd()">Verify & Add</button>
    </div>
    <div id="q-list"></div>
</div>

<script>
    const KEY = "eb7044678f7a620007e3d11387ccb51f";
    let currentData = []; // Logic: Safety pool to avoid apostrophe errors

    function tab(id) {
        document.querySelectorAll('.tab-content, nav button').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('b-' + id).classList.add('active');
        
        if(id === 'cinema') fetch('listings.json').then(r=>r.json()).then(d=> { currentData = d; render(d, 'cinema', 'venue'); });
        if(id === 'recs') fetch('recommendations.json').then(r=>r.json()).then(d=> { currentData = d; render(d, 'recs', 'source'); });
        if(id === 'queue') renderQ();
    }

    function render(data, id, meta) {
        document.getElementById(id).innerHTML = data.map((item, index) => `
            <div class="row">
                <div class="info-block">
                    <span class="meta">${item[meta]} ${item.tag ? `| ${item.tag}` : ''}</span>
                    <a href="${item.url || '#'}" target="_blank">${item.title}</a>
                    ${item.streaming ? `<span class="stream-tag">WATCH: ${item.streaming}</span>` : ''}
                </div>
                <button class="add-btn" onclick="saveFromList(${index}, '${meta}')">+</button>
            </div>`).join('');
    }

    function saveFromList(index, metaKey) {
        const item = currentData[index];
        save(item.title, item[metaKey], item.streaming || '', item.url || '', item.desc || "");
    }

    async function verifyAndAdd() {
        const query = document.getElementById('m-input').value;
        if(!query) return;
        try {
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${KEY}&query=${encodeURIComponent(query)}&region=GB`);
            const data = await res.json();
            if(!data.results?.length) return alert("Not Found");

            const hits = data.results.slice(0, 3);
            let pick = hits[0];
            if (hits.length > 1) {
                const opt = hits.map((h, i) => `${i+1}: ${h.title || h.name} (${(h.release_date || h.first_air_date || "").split('-')[0]})`).join('\n');
                const choice = prompt(opt, "1");
                if (choice && hits[choice-1]) pick = hits[choice-1];
            }

            const title = `${pick.title || pick.name} (${(pick.release_date || pick.first_air_date || "").split('-')[0]})`;
            const type = pick.media_type || (pick.title ? 'movie' : 'tv');
            
            const pRes = await fetch(`https://api.themoviedb.org/3/${type}/${pick.id}/watch/providers?api_key=${KEY}`);
            const pData = await pRes.json();
            const uk = pData.results?.GB?.flatrate || pData.results?.GB?.free || [];
            const stream = uk.length ? uk[0].provider_name : "Rent/Cinema Only";

            save(title, "Search", stream, `https://tmdb.org/${type}/${pick.id}`, pick.overview || "");
            document.getElementById('m-input').value = '';
        } catch(e) { alert("Search Error"); }
    }

    function save(title, source, streaming, url, desc) {
        let q = JSON.parse(localStorage.getItem('myQueue')) || [];
        if(!q.some(e => e.title === title)) {
            q.push({ title, source, streaming, url, desc: desc.substring(0, 140), date: new Date().toLocaleDateString() });
            localStorage.setItem('myQueue', JSON.stringify(q));
            alert("SAVED: " + title);
        }
    }

    function renderQ() {
        const q = JSON.parse(localStorage.getItem('myQueue')) || [];
        document.getElementById('q-list').innerHTML = q.map((i, index) => `
            <div class="row">
                <div class="info-block">
                    <span class="meta">${i.source} | ADDED ${i.date}</span>
                    <strong>${i.title}</strong>
                    ${i.desc ? `<div class="description">${i.desc}...</div>` : ''}
                    <span class="stream-tag">WATCH: ${i.streaming}</span>
                </div>
                <button class="add-btn" style="background:#ccc; color:#000" onclick="remove(${index})">×</button>
            </div>`).reverse().join('') || '<div class="row">LIBRARY EMPTY</div>';
    }

    function remove(index) {
        let q = JSON.parse(localStorage.getItem('myQueue')) || [];
        const reversedIndex = q.length - 1 - index; // Logic: Correct for .reverse()
        q.splice(reversedIndex, 1);
        localStorage.setItem('myQueue', JSON.stringify(q));
        renderQ();
    }

    tab('cinema');
</script>
</body>
</html>
