<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE QUEUE</title>
    <style>
        :root { --bg: #E6E6E6; --text: #1A1A1A; --grey: #CCCCCC; --accent: #195DDC; --white: #FFFFFF; }
        body { background: var(--bg); color: var(--text); font-family: "Helvetica Neue", Helvetica, sans-serif; margin: 0; padding: 25px; -webkit-font-smoothing: antialiased; }
        header { border-bottom: 3px solid var(--text); padding-bottom: 12px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; }
        .logo { font-weight: 900; font-size: 24px; letter-spacing: -1.5px; }
        nav { display: flex; gap: 20px; margin-bottom: 30px; overflow-x: auto; white-space: nowrap; }
        nav button { background: none; border: none; color: #999; padding: 10px 0; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        nav button.active { color: var(--text); border-bottom: 3px solid var(--accent); }
        .tab-content { display: none; max-width: 800px; }
        .tab-content.active { display: block; }
        .row { border-bottom: 1px solid var(--grey); padding: 20px 0; display: flex; justify-content: space-between; align-items: center; }
        .row.watched { opacity: 0.5; text-decoration: line-through; }
        .info-block { flex-grow: 1; padding-right: 15px; }
        .row a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 16px; display: block; margin-bottom: 4px; }
        .meta { font-size: 10px; color: #666; text-transform: uppercase; font-weight: 700; margin-bottom: 4px; display: block; }
        .stream-tag { font-size: 10px; color: var(--accent); font-weight: 700; display: block; margin-top: 5px; }
        .btn-group { display: flex; gap: 8px; }
        .action-btn { background: var(--text); color: var(--white); border: none; width: 32px; height: 32px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .search-container { display: flex; gap: 10px; margin-bottom: 20px; background: var(--white); padding: 5px; border: 1px solid var(--grey); }
        input { background: transparent; border: none; padding: 10px; font-family: inherit; flex-grow: 1; outline: none; font-size: 13px; }
    </style>
</head>
<body>

<header>
    <div><div class="logo">THE QUEUE</div><div style="font-size: 10px; font-weight: 700; text-transform: uppercase;">EDINBURGH / 2026</div></div>
    <div id="status-dot" style="color: var(--accent); font-size: 20px;">●</div>
</header>

<nav>
    <button onclick="switchTab('cinema')" id="b-cinema" class="active">Cinema</button>
    <button onclick="switchTab('recs')" id="b-recs">Recs</button>
    <button onclick="switchTab('queue')" id="b-queue">Queue</button>
    <button onclick="switchTab('library')" id="b-library">Owned</button>
</nav>

<div id="cinema" class="tab-content active"></div>
<div id="recs" class="tab-content"></div>

<div id="queue" class="tab-content">
    <div class="search-container">
        <input type="text" id="q-input" placeholder="SEARCH TMDB TO QUEUE...">
        <button style="background:var(--text); color:#fff; border:none; padding:10px;" onclick="verifyAndAdd('queue')">ADD</button>
    </div>
    <div id="q-list"></div>
</div>

<div id="library" class="tab-content">
    <div class="search-container">
        <input type="text" id="l-input" placeholder="ADD OWNED (DVD/DIGITAL)...">
        <button style="background:var(--text); color:#fff; border:none; padding:10px;" onclick="verifyAndAdd('library')">ADD</button>
    </div>
    <div id="l-list"></div>
</div>

<script>
    const KEY = "eb7044678f7a620007e3d11387ccb51f";
    let pool = [];

    function switchTab(id) {
        document.querySelectorAll('.tab-content, nav button').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('b-' + id).classList.add('active');
        if(id === 'cinema') fetch('listings.json').then(r=>r.json()).then(d=> { pool = d; renderList(d, 'cinema', 'venue'); });
        if(id === 'recs') fetch('recommendations.json').then(r=>r.json()).then(d=> { pool = d; renderList(d, 'recs', 'source'); });
        if(id === 'queue' || id === 'library') renderStored(id);
    }

    function renderList(data, containerId, metaKey) {
        document.getElementById(containerId).innerHTML = data.map((item, index) => `
            <div class="row">
                <div class="info-block">
                    <span class="meta">${item[metaKey]} ${item.tag ? `| ${item.tag}` : ''}</span>
                    <a href="${item.url || '#'}" target="_blank">${item.title}</a>
                    <span class="stream-tag">${item.streaming || ''}</span>
                </div>
                <button class="action-btn" onclick="addFromList(${index}, '${metaKey}')">+</button>
            </div>`).join('');
    }

    async function verifyAndAdd(store) {
        const inputId = store === 'queue' ? 'q-input' : 'l-input';
        const query = document.getElementById(inputId).value;
        if(!query) return;
        try {
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${KEY}&query=${encodeURIComponent(query)}&region=GB`);
            const data = await res.json();
            const p = data.results[0];
            const title = `${p.title || p.name} (${(p.release_date || p.first_air_date || "").split('-')[0]})`;
            save(title, store === 'queue' ? 'Search' : 'Owned', '', `https://tmdb.org/${p.id}`, p.overview, store);
            document.getElementById(inputId).value = '';
        } catch(e) { alert("Error finding title"); }
    }

    function addFromList(idx, key) {
        const i = pool[idx];
        save(i.title, i[key], i.streaming, i.url, i.desc, 'queue');
    }

    function save(title, source, streaming, url, desc, store) {
        let db = JSON.parse(localStorage.getItem(store)) || [];
        if(!db.some(e => e.title === title)) {
            db.push({ id: Date.now(), title, source, streaming, url, desc: (desc||"").substring(0,100), watched: false });
            localStorage.setItem(store, JSON.stringify(db));
            alert("SAVED TO " + store.toUpperCase());
            renderStored(store);
        }
    }

    function renderStored(store) {
        const db = JSON.parse(localStorage.getItem(store)) || [];
        const listId = store === 'queue' ? 'q-list' : 'l-list';
        document.getElementById(listId).innerHTML = db.map(i => `
            <div class="row ${i.watched ? 'watched' : ''}">
                <div class="info-block">
                    <span class="meta">${i.source}</span>
                    <strong>${i.title}</strong>
                    <span class="stream-tag">${i.streaming || ''}</span>
                </div>
                <div class="btn-group">
                    <button class="action-btn" style="background:#ccc; color:#000" onclick="toggleWatch('${store}', ${i.id})">✓</button>
                    <button class="action-btn" style="background:#999; color:#fff" onclick="remove('${store}', ${i.id})">×</button>
                </div>
            </div>`).reverse().join('');
    }

    function toggleWatch(store, id) {
        let db = JSON.parse(localStorage.getItem(store));
        db = db.map(item => item.id === id ? {...item, watched: !item.watched} : item);
        localStorage.setItem(store, JSON.stringify(db));
        renderStored(store);
    }

    function remove(store, id) {
        let db = JSON.parse(localStorage.getItem(store));
        localStorage.setItem(store, JSON.stringify(db.filter(item => item.id !== id)));
        renderStored(store);
    }

    switchTab('cinema');
</script>
</body>
</html>
