<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE QUEUE | Edinburgh 2026</title>
    <style>
        :root { --bg: #121212; --text: #e0e0e0; --accent: #f5f5f5; --box: #1e1e1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; text-transform: uppercase; }
        header { border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
        nav { display: flex; gap: 10px; margin-bottom: 20px; }
        button { background: none; border: 1px solid var(--accent); color: var(--text); padding: 10px 20px; cursor: pointer; font-family: inherit; }
        button.active { background: var(--accent); color: var(--bg); }
        .tab-content { display: none; background: var(--box); padding: 20px; border-left: 4px solid var(--accent); }
        .tab-content.active { display: block; }
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .venue-tag { font-size: 0.8em; color: #888; display: block; }
    </style>
</head>
<body>

<header>
    <h1>The Queue</h1>
    <div>B & K — Edinburgh — 2026</div>
</header>

<nav id="top-nav">
    <button onclick="showTab('cinema')" id="btn-cinema">Cinema</button>
    <button onclick="showTab('recs')" id="btn-recs">Recs</button>
</nav>

<div id="cinema" class="tab-content">
    <h3>Edinburgh Listings (Automated)</h3>
    <ul id="cinema-list">Loading today's showtimes...</ul>
</div>

<div id="recs" class="tab-content">
    <h3>Smart Picks (Critic Feed)</h3>
    <ul id="recs-list">Loading smart recommendations...</ul>
</div>

<script>
    function showTab(tabId) {
        // 1. Logic: Update Buttons
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + tabId).classList.add('active');

        // 2. Logic: Update Content
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');

        // 3. Logic: Data Fetch
        if (tabId === 'cinema') fetchCinema();
        if (tabId === 'recs') fetchRecs();
    }

    async function fetchCinema() {
        const list = document.getElementById('cinema-list');
        try {
            const res = await fetch('listings.json');
            const data = await res.json();
            list.innerHTML = data.map(m => `<li><strong>${m.title}</strong><span class="venue-tag">${m.venue}</span></li>`).join('');
        } catch (e) { list.innerHTML = "<li>Cinema data pending robot run.</li>"; }
    }

    async function fetchRecs() {
        const list = document.getElementById('recs-list');
        try {
            const res = await fetch('recommendations.json');
            const data = await res.json();
            list.innerHTML = data.map(r => `<li><strong>${r.title}</strong><span class="venue-tag">Source: ${r.source}</span></li>`).join('');
        } catch (e) { list.innerHTML = "<li>Recs data pending robot run.</li>"; }
    }

    // Default to Cinema on load
    showTab('cinema');
</script>

</body>
</html>
