<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>The Queue</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

:root {
  /* Dieter Rams / Braun Aesthetic Palette */
  --paper: #EBEBEB;      
  --paper2: #D1D1D1;     
  --paper3: #BDBDBD;     
  --ink: #000000;        
  --ink2: #303030;       
  --ink3: #636363;       
  --rule: #BDBDBD;
  
  /* Functional Accents */
  --signal-orange: #DA441B; 
  --signal-green: #2B7A4B;  
  --blue: #1a3a5c;
  --gold: #8a6a1a;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── HEADER ── */
.topbar {
  background: var(--ink);
  padding: 14px 16px 10px;
  display: flex;
  align-items: flex-end;
  gap: 12px;
}
.htitle {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 1rem;
  font-weight: 700;
  color: #FFFFFF;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.hsub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: .52rem;
  color: var(--paper3);
  letter-spacing: .12em;
  text-transform: uppercase;
  padding-bottom: 2px;
}
.who-toggle {
  margin-left: auto;
  display: flex;
  border: 1px solid var(--ink3);
}
.wb {
  font-family: 'IBM Plex Mono', monospace;
  font-size: .65rem;
  font-weight: 700;
  padding: 6px 16px;
  background: none;
  border: none;
  color: var(--paper3);
  cursor: pointer;
}
.wb.on { background: #FFFFFF; color: var(--ink); }
.wb:first-child { border-right: 1px solid var(--ink3); }

/* ── TABS ── */
.tabbar {
  background: var(--paper2);
  display: flex;
  border-bottom: 1.5px solid var(--ink);
}
.tabitem {
  font-family: 'IBM Plex Mono', monospace;
  font-size: .58rem;
  padding: 12px 16px;
  background: none;
  border: none;
  color: var(--ink3);
  cursor: pointer;
  text-transform: uppercase;
}
.tabitem.on {
  color: #FFFFFF;
  background: var(--ink);
  font-weight: 700;
}

/* ── MAIN ── */
main { padding: 14px 14px 80px; }
.sec { display: none; }
.sec.on { display: block; }

/* ── FORM & BUTTONS ── */
.addform {
  background: #FFFFFF;
  border: 1px solid var(--paper3);
  padding: 10px;
  margin-bottom: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.addform input, .addform select {
  font-family: 'IBM Plex Mono', monospace;
  font-size: .75rem;
  padding: 10px;
  border: 1.5px solid var(--paper2);
  background: #F9F9F9;
}
.addbtn {
  background: var(--signal-orange);
  color: #FFFFFF;
  border: none;
  padding: 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 700;
  text-transform: uppercase;
  cursor: pointer;
}
.gbtn {
  background: var(--ink);
  color: #FFFFFF;
  border: none;
  padding: 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: .62rem;
  text-transform: uppercase;
  cursor: pointer;
}

/* ── CARDS ── */
.qcard {
  background: #FFFFFF;
  border: 1px solid var(--paper3);
  padding: 12px;
  margin-bottom: 1px;
  border-left: 6px solid var(--paper3);
}
.qcard.acc { border-left-color: var(--signal-green); }

.card-title { font-family: 'IBM Plex Mono', monospace; font-size: .9rem; font-weight: 700; }
.card-actions { display: flex; gap: 8px; margin-top: 10px; border-top: 1px solid var(--paper); padding-top: 8px; }
